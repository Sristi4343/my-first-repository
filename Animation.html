 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Me</title>
    <style>
        .btn{
            padding: 115px 40px;
            font-size: 20px;
            text-align: center;
            background-color: aqua;
            color: aliceblue;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 2s ease-in;
        }
        .btn:hover{
            background-color: brown;
          transform: scale(2);
        }
    </style>
 </head>
 <body>
    <button class="btn">Hover Me!</button>
 </body>
 </html>
